<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAWI — Украшения ручной работы</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Montserrat',sans-serif;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
  padding:20px;
}
.card{
  width:100%;max-width:420px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:24px;
  padding:40px 32px;
  text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.3);
}
.avatar{
  width:90px;height:90px;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  border:3px solid rgba(255,255,255,0.4);
  margin:0 auto 16px;
  display:flex;align-items:center;justify-content:center;
  font-size:40px;
}
.name{
  font-size:24px;font-weight:700;
  color:#fff;margin-bottom:4px;
  text-shadow:0 2px 8px rgba(0,0,0,0.2);
}
.subtitle{
  font-size:14px;
  color:rgba(255,255,255,0.75);
  margin-bottom:28px;
}
.links{display:flex;flex-direction:column;gap:12px;margin-bottom:28px}
.link-btn{
  display:flex;align-items:center;gap:14px;
  padding:14px 20px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:14px;
  text-decoration:none;
  color:#fff;font-weight:500;font-size:15px;
  transition:all 0.3s ease;
}
.link-btn:hover{
  background:rgba(255,255,255,0.25);
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(0,0,0,0.15);
}
.link-btn .icon{
  width:40px;height:40px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.link-btn .icon.tg{background:linear-gradient(135deg,#0088cc,#005fa3)}
.link-btn .icon.ig{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
.link-btn .text{flex:1;text-align:left}
.link-btn .arrow{opacity:0.5;font-size:18px}
.qr-section{
  padding-top:20px;
  border-top:1px solid rgba(255,255,255,0.15);
}
.qr-label{
  font-size:12px;
  color:rgba(255,255,255,0.6);
  margin-bottom:12px;
  text-transform:uppercase;
  letter-spacing:1px;
}
#qr-canvas{
  border-radius:12px;
  background:#fff;
  padding:8px;
  display:inline-block;
  box-shadow:0 4px 16px rgba(0,0,0,0.1);
}
.footer{
  margin-top:20px;
  font-size:11px;
  color:rgba(255,255,255,0.4);
}
</style>
</head>
<body>
<div class="card">
  <div class="avatar">💎</div>
  <div class="name">BAWI</div>
  <div class="subtitle">Украшения ручной работы</div>

  <div class="links">
    <a href="https://telegram.me/bawijewellery" target="_blank" class="link-btn">
      <div class="icon tg">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.95 7.47l-1.97 9.28c-.15.67-.54.83-1.09.52l-3.02-2.22-1.46 1.4c-.16.16-.3.3-.61.3l.22-3.05 5.56-5.02c.24-.22-.05-.33-.37-.14l-6.86 4.32-2.96-.92c-.64-.2-.66-.64.13-.95l11.57-4.47c.54-.2 1.01.13.83.95z"/></svg>
      </div>
      <span class="text">Telegram канал</span>
      <span class="arrow">→</span>
    </a>
    <a href="https://www.instagram.com/bawi.jewellery" target="_blank" class="link-btn">
      <div class="icon ig">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
      </div>
      <span class="text">Instagram</span>
      <span class="arrow">→</span>
    </a>
  </div>

  <div class="qr-section">
    <div class="qr-label">Сканируй QR</div>
    <div id="qr-canvas"></div>
  </div>

  <div class="footer">bawi.jewellery</div>
</div>

<script>
var links=[
  {name:'Telegram',url:'https://telegram.me/bawijewellery'},
  {name:'Instagram',url:'https://www.instagram.com/bawi.jewellery'}
];
var linktreeUrl='https://linktr.ee/bawijewellery';
QRCode.toCanvas(document.createElement('canvas'),links[0].url,{
  width:140,
  margin:1,
  color:{dark:'#1a1a2e',light:'#ffffff'}
},function(error,canvas){
  if(error)return console.error(error);
  document.getElementById('qr-canvas').appendChild(canvas);
});
</script>
</body>
</html>
